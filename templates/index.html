<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Anthoscope</title>

  <link rel="shortcut icon" href="/static/anthoscope-logo1.ico">
  <link rel="icon" type="image/x-icon" href="/static/anthoscope-logo1.ico">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script defer src="/_vercel/insights/script.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink: #ff4d7a;
      --pink-dim: rgba(255, 77, 122, 0.15);
      --pink-glow: rgba(255, 77, 122, 0.35);
      --bg: #060e12;
      --surface: rgba(10, 20, 28, 0.92);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8edf0;
      --muted: rgba(232, 237, 240, 0.45);
      --toggle-bg: #1a2a33;
    }

    /* Light Mode Overrides */
    body.light-theme {
      --bg: #f0f2f5;
      --surface: rgba(255, 255, 255, 0.9);
      --border: rgba(0, 0, 0, 0.1);
      --text: #1a1e21;
      --muted: rgba(0, 0, 0, 0.5);
      --toggle-bg: #87ceeb;
    }

    * {
      cursor: url("/static/cursor.png"), auto !important;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Syne', sans-serif;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      transition: background 0.3s ease;
    }

    /* ── Map ── */
    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    
    /* Dark mode filter applied only when light-theme class is NOT present */
    body:not(.light-theme) #map {
      filter: hue-rotate(300deg) brightness(0.95) saturate(1.4);
    }

    /* ── Logo ── */
    #logo-container {
      position: absolute;
      top: 24px;
      left: 20px;
      width: 260px;
      z-index: 1000;
      pointer-events: none;
    }
    #logo-container img {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 0 12px var(--pink-glow));
    }

    /* ── Theme Toggle ── */
    #theme-switch-wrapper {
      position: absolute;
      top: 24px;
      right: 20px;
      z-index: 1000;
    }

    .theme-switch {
      position: relative;
      display: inline-block;
      width: 64px;
      height: 32px;
    }

    .theme-switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--toggle-bg);
      transition: .4s;
      border-radius: 32px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* The "Ball" (Sun/Moon) */
    .slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 4px;
      bottom: 3px;
      background-color: #f3f3f3; /* Moon color */
      transition: .4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
      z-index: 2;
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
    }

    /* Light Mode State */
    input:checked + .slider:before {
      transform: translateX(32px);
      background-color: #ffce54; /* Sun color */
      box-shadow: 0 0 15px #ffce54;
    }

    /* ── Glass card base ── */
    .glass-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(255,77,122,0.08) inset,
        0 16px 40px rgba(0, 0, 0, 0.55);
      z-index: 1000;
      position: absolute;
      transition: background 0.3s, border 0.3s;
    }

    /* ── Pollen report panel ── */
    #pollen-report {
      top: 136px;
      left: 20px;
      width: 300px;
      padding: 18px 20px 14px;
      display: none;
      animation: slideIn 0.25s ease;
      max-height: calc(100vh - 200px);
      overflow: hidden;
      display: none;
      flex-direction: column;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #report-loc {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--pink);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    /* ── Day Tabs ── */
    #day-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .day-tab {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      transition: all 0.15s ease;
      cursor: pointer;
    }
    .day-tab:hover { color: var(--text); border-color: rgba(255,77,122,0.4); }
    .day-tab.active {
      background: var(--pink);
      color: white;
      border-color: var(--pink);
    }

    /* ── Hourly scroll list ── */
    #pollen-list {
      overflow-y: auto;
      flex: 1;
      padding-right: 4px;
    }

    #pollen-list::-webkit-scrollbar { width: 3px; }
    #pollen-list::-webkit-scrollbar-track { background: transparent; }
    #pollen-list::-webkit-scrollbar-thumb { background: var(--pink-dim); border-radius: 4px; }

    .hour-block {
      margin-bottom: 14px;
    }

    .hour-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--pink);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .pollen-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .pollen-item:last-child { border-bottom: none; }

    .pollen-label {
      font-weight: 700;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pollen-val {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--pink);
    }

    .tag {
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .tag-none { background: rgba(120,120,120,0.15); color: rgba(200,200,200,0.5); }
    .tag-low  { background: rgba(76,175,80,0.2);  color: #81c784; }
    .tag-mod  { background: rgba(255,193,7,0.2);  color: #ffd54f; }
    .tag-high { background: rgba(239,83,80,0.25); color: #ef9a9a; }

    .loading-msg {
      font-size: 0.78rem;
      padding: 8px 0;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .summary-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    .sum-chip {
      flex: 1;
      text-align: center;
      padding: 5px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.58rem;
      font-family: 'Space Mono', monospace;
    }
    .sum-chip .chip-name { color: var(--muted); display: block; margin-bottom: 2px; }
    .sum-chip .chip-val  { color: var(--pink); font-weight: 700; font-size: 0.72rem; }

    /* ── Draw button ── */
    #drawAreaBtn {
      position: absolute;
      bottom: 28px;
      left: 20px;
      z-index: 1000;
      width: 260px;
      padding: 14px 20px;
      background: var(--pink);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px var(--pink-glow);
      transition: all 0.15s ease;
    }
    #drawAreaBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px var(--pink-glow);
    }
    #drawAreaBtn.active-draw {
      background: #222d33;
      box-shadow: 0 0 0 2px var(--pink);
      color: var(--pink);
    }

    /* ── Hint ── */
    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 25, 35, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 24px;
      border-radius: 30px;
      border: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--pink);
      z-index: 1000;
      pointer-events: none;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    /* ── Review modal ── */
    #review-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }
    #review-modal.visible { display: flex; }

    .modal-content {
      background: var(--surface);
      padding: 28px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      border: 1px solid var(--pink);
      box-shadow: 0 0 60px rgba(255,77,122,0.2);
    }

    .modal-content h2 {
      color: var(--pink);
      font-size: 1.1rem;
      margin-bottom: 6px;
    }

    .modal-content p {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-bottom: 14px;
    }

    .modal-content textarea {
      width: 100%;
      height: 100px;
      padding: 12px;
      background: rgba(0,0,0,0.1);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      resize: none;
      outline: none;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-cancel, .btn-submit {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .btn-cancel {
      background: rgba(0,0,0,0.05);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-submit {
      background: var(--pink);
      color: white;
      border: none;
      box-shadow: 0 4px 14px var(--pink-glow);
    }

    /* Leaflet popup tweak */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      font-family: 'Syne', sans-serif !important;
      border-radius: 10px !important;
      border: 1px solid var(--pink) !important;
    }
  </style>
</head>
<body>

  <div id="logo-container">
    <img src="{{ url_for('static', filename='images/anthologo_neg.png') }}" alt="Anthoscope">
  </div>

  <div id="theme-switch-wrapper">
    <label class="theme-switch">
      <input type="checkbox" id="theme-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="pollen-report" class="glass-card">
    <h2 id="report-loc">LOCAL POLLEN DATA</h2>
    <div id="summary-bar" class="summary-bar" style="display:none"></div>
    <div id="day-tabs"></div>
    <div id="pollen-list"></div>
  </div>

  <div class="hint">📍 Tap anywhere on the map to inspect local pollen levels</div>

  <button id="drawAreaBtn">Draw Area &amp; Review</button>

  <div id="map"></div>

  <div id="review-modal">
    <div class="modal-content">
      <h2>Submit Allergy Review</h2>
      <p id="area-summary"></p>
      <textarea id="rev-text" placeholder="Describe the pollen impact in this area…"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeReviewModal()">Cancel</button>
        <button class="btn-submit" onclick="submitReview()">Submit</button>
      </div>
    </div>
  </div>

  <script>
    let map, activeMarker, drawingCircle, tileLayer;
    let isDrawingMode = false;
    let reviewMarkers = [];

    const LIGHT_TILES = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
    const DARK_TILES = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';

    const POLLEN_TYPES = [
      { key: 'birch_pollen',   label: 'Birch',   emoji: '🌳' },
      { key: 'grass_pollen',   label: 'Grass',   emoji: '🌿' },
      { key: 'ragweed_pollen', label: 'Ragweed', emoji: '🌾' },
      { key: 'alder_pollen',   label: 'Alder',   emoji: '🍃' },
      { key: 'mugwort_pollen', label: 'Mugwort', emoji: '🌱' }
    ];

    let pollenByDay = {};   // { "2026-04-14": [ {hour, birch, grass, ...}, ... ] }
    let activeDayKey = null;

    function getCategory(val) {
      if (val === null || val === undefined) return { label: 'N/A', cls: 'tag-none' };
      if (val > 80) return { label: 'High', cls: 'tag-high' };
      if (val > 30) return { label: 'Mod',  cls: 'tag-mod'  };
      if (val > 0)  return { label: 'Low',  cls: 'tag-low'  };
      return               { label: '–',    cls: 'tag-none' };
    }

    function fmtHour(isoStr) {
      // "2026-04-14T09:00" → "09:00"
      return isoStr.slice(11, 16);
    }

    function fmtDateLabel(dateKey) {
      const d = new Date(dateKey + 'T12:00:00Z');
      const today = new Date();
      const todayKey = today.toISOString().slice(0, 10);
      const tomorrowKey = new Date(Date.now() + 86400000).toISOString().slice(0, 10);
      if (dateKey === todayKey) return 'Today';
      if (dateKey === tomorrowKey) return 'Tomorrow';
      return d.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric', timeZone: 'UTC' });
    }

    function buildDayData(apiData) {
      const times = apiData.hourly.time;
      const result = {};

      times.forEach((t, i) => {
        const dayKey = t.slice(0, 10);
        if (!result[dayKey]) result[dayKey] = [];

        const entry = { time: t };
        let hasAnyData = false;
        POLLEN_TYPES.forEach(pt => {
          const val = apiData.hourly[pt.key]?.[i];
          entry[pt.key] = (val !== null && val !== undefined) ? val : null;
          if (val !== null && val !== undefined) hasAnyData = true;
        });
        if (hasAnyData || result[dayKey].length > 0) {
          result[dayKey].push(entry);
        }
      });

      // Remove days where all values are null
      Object.keys(result).forEach(day => {
        const anyReal = result[day].some(h =>
          POLLEN_TYPES.some(pt => h[pt.key] !== null)
        );
        if (!anyReal) delete result[day];
      });

      return result;
    }

    function renderDayTabs() {
      const tabsDiv = document.getElementById('day-tabs');
      tabsDiv.innerHTML = '';
      Object.keys(pollenByDay).forEach((dayKey, idx) => {
        const btn = document.createElement('button');
        btn.className = 'day-tab' + (dayKey === activeDayKey ? ' active' : '');
        btn.textContent = fmtDateLabel(dayKey);
        btn.onclick = () => selectDay(dayKey);
        tabsDiv.appendChild(btn);
      });
    }

    function renderSummaryBar(dayKey) {
      const bar = document.getElementById('summary-bar');
      const hours = pollenByDay[dayKey] || [];
      bar.style.display = 'flex';
      bar.innerHTML = POLLEN_TYPES.slice(0, 4).map(pt => {
        const vals = hours.map(h => h[pt.key]).filter(v => v !== null);
        const peak = vals.length ? Math.max(...vals) : null;
        const { cls } = getCategory(peak);
        return `<div class="sum-chip ${cls}">
          <span class="chip-name">${pt.label}</span>
          <span class="chip-val">${peak !== null ? Math.round(peak) : '–'}</span>
        </div>`;
      }).join('');
    }

    function renderHourList(dayKey) {
      const listDiv = document.getElementById('pollen-list');
      const hours = pollenByDay[dayKey] || [];

      // Show only a few key hours or all
      const display = hours.filter((_, i) => i % 3 === 0 || i === hours.length - 1);

      if (!display.length) {
        listDiv.innerHTML = '<p class="loading-msg">No data for this day.</p>';
        return;
      }

      listDiv.innerHTML = display.map(h => {
        const rows = POLLEN_TYPES.map(pt => {
          const val = h[pt.key];
          const { label, cls } = getCategory(val);
          const display = val !== null ? Math.round(val) : '–';
          return `<div class="pollen-item">
            <span class="pollen-label">${pt.emoji} ${pt.label}<span class="tag ${cls}">${label}</span></span>
            <span class="pollen-val">${display}</span>
          </div>`;
        }).join('');

        return `<div class="hour-block">
          <div class="hour-label">⏱ ${fmtHour(h.time)}</div>
          ${rows}
        </div>`;
      }).join('');
    }

    function selectDay(dayKey) {
      activeDayKey = dayKey;
      renderDayTabs();
      renderSummaryBar(dayKey);
      renderHourList(dayKey);
    }

    function pinSVG() {
      return `<svg width="30" height="42" viewBox="0 0 30 42" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 0C6.7 0 0 6.7 0 15C0 26.2 15 42 15 42C15 42 30 26.2 30 15C30 6.7 23.3 0 15 0Z" fill="#ff4d7a"/>
        <circle cx="15" cy="15" r="6" fill="white" fill-opacity="0.9"/>
      </svg>`;
    }

    async function onMapClick(e) {
      if (isDrawingMode) return;

      const { lat, lng } = e.latlng;
      const reportDiv = document.getElementById('pollen-report');
      const listDiv   = document.getElementById('pollen-list');
      const tabsDiv   = document.getElementById('day-tabs');
      const bar       = document.getElementById('summary-bar');

      reportDiv.style.display = 'flex';
      tabsDiv.innerHTML = '';
      bar.style.display = 'none';
      listDiv.innerHTML = '<p class="loading-msg">⌛ Fetching forecast…</p>';
      document.getElementById('report-loc').textContent =
        `${lat.toFixed(3)}°N  ${lng.toFixed(3)}°E`;

      if (activeMarker) {
        activeMarker.setLatLng(e.latlng);
      } else {
        activeMarker = L.marker(e.latlng, {
          icon: L.divIcon({
            className: '',
            html: pinSVG(),
            iconSize: [30, 42],
            iconAnchor: [15, 42]
          })
        }).addTo(map);
      }

      try {
        const pollenKeys = POLLEN_TYPES.map(p => p.key).join(',');
        const url = `https://air-quality-api.open-meteo.com/v1/air-quality` +
          `?latitude=${lat}&longitude=${lng}` +
          `&hourly=${pollenKeys}` +
          `&forecast_days=5` +
          `&timezone=auto`;

        const resp = await fetch(url);
        if (!resp.ok) throw new Error('API error ' + resp.status);
        const data = await resp.json();

        pollenByDay = buildDayData(data);
        const days = Object.keys(pollenByDay);

        if (!days.length) {
          listDiv.innerHTML = '<p class="loading-msg">⚠ No pollen data available.</p>';
          return;
        }

        // Default to today or first available day
        const todayKey = new Date().toISOString().slice(0, 10);
        activeDayKey = days.includes(todayKey) ? todayKey : days[0];

        renderDayTabs();
        renderSummaryBar(activeDayKey);
        renderHourList(activeDayKey);

      } catch (err) {
        listDiv.innerHTML = `<p class="loading-msg">⚠ Could not fetch data.<br><small>${err.message}</small></p>`;
      }
    }

    function initMap() {
      map = L.map('map', { zoomControl: false }).setView([48.85, 2.35], 5);

      tileLayer = L.tileLayer(DARK_TILES, {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      map.on('click', onMapClick);

      const themeToggle = document.getElementById('theme-toggle');
      themeToggle.addEventListener('change', (e) => {
        if (e.target.checked) {
          document.body.classList.add('light-theme');
          tileLayer.setUrl(LIGHT_TILES);
        } else {
          document.body.classList.remove('light-theme');
          tileLayer.setUrl(DARK_TILES);
        }
      });

      document.getElementById('drawAreaBtn').addEventListener('click', toggleDrawingMode);
      loadReviews();
    }

    async function loadReviews() {
      reviewMarkers.forEach(m => map.removeLayer(m));
      reviewMarkers = [];

      try {
        const res  = await fetch('/api/reviews');
        const data = await res.json();

        if (data.success && Array.isArray(data.reviews)) {
          data.reviews.forEach(r => {
            const m = L.marker([r.center_lat, r.center_lng], {
              icon: L.icon({
                iconUrl: "/static/point.png",
                iconSize:   [40, 40],
                iconAnchor: [20, 20]
              })
            }).addTo(map);

            m.bindPopup(`<b>Review</b><br>${r.review_text}`);
            reviewMarkers.push(m);
          });
        }
      } catch (e) {
        console.error('Could not load reviews:', e);
      }
    }

    function toggleDrawingMode() {
      isDrawingMode = !isDrawingMode;
      const btn = document.getElementById('drawAreaBtn');

      if (isDrawingMode) {
        btn.textContent = 'Tap map to place area';
        btn.classList.add('active-draw');
        map.off('click', onMapClick);

        map.once('click', (e) => {
          drawingCircle = L.circle(e.latlng, {
            radius: 2500,
            color: '#ff4d7a',
            fillOpacity: 0.2,
            weight: 2
          }).addTo(map);

          openReviewModal(e.latlng);
          isDrawingMode = false;
          btn.textContent = 'Draw Area & Review';
          btn.classList.remove('active-draw');
        });
      } else {
        btn.textContent = 'Draw Area & Review';
        btn.classList.remove('active-draw');
        map.off('click');
        map.on('click', onMapClick);
      }
    }

    function openReviewModal(latlng) {
      document.getElementById('area-summary').textContent =
        `Lat: ${latlng.lat.toFixed(4)}  |  Lng: ${latlng.lng.toFixed(4)}`;
      document.getElementById('rev-text').value = '';
      document.getElementById('review-modal').classList.add('visible');
      window.currentLatlng = latlng;
    }

    function closeReviewModal() {
      document.getElementById('review-modal').classList.remove('visible');
      if (drawingCircle) {
        map.removeLayer(drawingCircle);
        drawingCircle = null;
      }
      map.off('click');
      map.on('click', onMapClick);
    }

    async function submitReview() {
      const reviewText = document.getElementById('rev-text').value.trim();
      if (!reviewText) return;

      const payload = {
        centerLat:  window.currentLatlng.lat,
        centerLng:  window.currentLatlng.lng,
        radiusKm:   2.5,
        reviewText
      };

      try {
        const res = await fetch('/api/reviews', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.success) {
          closeReviewModal();
          loadReviews();
        }
      } catch (e) {
        console.error('Submit failed:', e);
      }
    }

    window.onload = initMap;
  </script>
</body>
</html>

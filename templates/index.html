<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Anthoscope • Pollen Inspector</title>
  
  <link rel="shortcut icon" href="/static/anthologo-neg.ico">
  <link rel="icon" type="image/x-icon" href="/static/anthologo-neg.ico">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { 
      cursor: url("/static/cursor.png"), auto !important; 
      box-sizing: border-box; 
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      height: 100vh; 
      background: #0a1a1f; 
      color: white; 
      overflow: hidden; 
    }

    #map { 
      height: 100%; 
      width: 100%; 
      z-index: 1; 
      background: #0a1a1f;
      filter: hue-rotate(300deg) brightness(1.1) saturate(1.5);
    }
    
    #logo-container {
      position: absolute; 
      top: 25px; 
      left: 20px; 
      width: 300px; 
      z-index: 1000; 
      pointer-events: none;
    }

    #logo-container img { 
      width: 100%; 
      height: auto; 
      display: block; 
    }

    .glass-card {
      background: rgba(15, 25, 35, 0.9); 
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px); 
      border-radius: 20px; 
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); 
      z-index: 1000; 
      position: absolute;
    }
    
    #pollen-report {
      top: 145px; 
      left: 20px; 
      width: 300px; 
      padding: 20px; 
      display: none; 
    }

    .pollen-item {
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 8px 0; 
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .pollen-label { 
      font-weight: 600; 
      font-size: 0.85rem; 
    }

    .pollen-val { 
      font-family: monospace; 
      color: #ffb7cc; 
    }
    
    .tag { 
      padding: 2px 6px; 
      border-radius: 4px; 
      font-size: 0.65rem; 
      font-weight: 700; 
      text-transform: uppercase; 
      margin-left: 8px; 
    }

    .tag-low { background: #c8e6c9; color: #1b5e20; }
    .tag-mod { background: #fff9c4; color: #f57f17; }
    .tag-high { background: #ef5350; color: #fff; }

    #review-modal { 
      display: none; 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.8); 
      z-index: 2000; 
      justify-content: center; 
      align-items: center; 
    }

    .modal-content { 
      background: #1a2a2f; 
      padding: 25px; 
      border-radius: 20px; 
      width: 90%; 
      max-width: 400px; 
      border: 1px solid #ff4d7a; 
    }
  </style>
</head>

<body>

<div id="logo-container">
  <img src="/static/anthologo-neg.png" alt="Anthoscope">
</div>

<div id="pollen-report" class="glass-card">
  <h2 id="report-loc" style="font-size: 0.7rem; color: #ff4d7a; margin-bottom: 10px;">
    LOCAL POLLEN DATA
  </h2>
  <div id="pollen-list"></div>
</div>

<div id="map"></div>

<div id="review-modal">
  <div class="modal-content">
    <h2 style="color:#ff4d7a;">Submit Allergy Review</h2>
    <p id="area-summary"></p>
    <textarea id="rev-text"></textarea>
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="closeReviewModal()">Cancel</button>
      <button onclick="submitReview()">Submit</button>
    </div>
  </div>
</div>

<script>
let map, activeMarker, reviewMarkers = [];

function initMap() {
  map = L.map('map').setView([48.85, 2.35], 5);

  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
  ).addTo(map);

  map.on('click', onMapClick);
  loadReviews();
}

async function onMapClick(e) {
  const { lat, lng } = e.latlng;

  const reportDiv = document.getElementById('pollen-report');
  const listDiv = document.getElementById('pollen-list');

  reportDiv.style.display = 'block';
  listDiv.innerHTML = 'Loading...';

  if (activeMarker) activeMarker.setLatLng(e.latlng);
  else activeMarker = L.marker(e.latlng).addTo(map);

  const types = [
    'birch_pollen',
    'grass_pollen',
    'ragweed_pollen',
    'alder_pollen',
    'mugwort_pollen'
  ];

  const resp = await fetch(
    `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lng}&current=${types.join(',')}`
  );

  const data = await resp.json();
  listDiv.innerHTML = '';

  types.forEach(type => {
    const val = data.current[type] || 0;
    listDiv.innerHTML += `<div>${type}: ${Math.round(val)}</div>`;
  });
}

async function loadReviews() {
  const res = await fetch('/api/reviews');
  const data = await res.json();

  if (!data.success) return;

  data.reviews.forEach(r => {
    L.marker([r.center_lat, r.center_lng], {
      icon: L.icon({
        iconUrl: "/static/point.png",
        iconSize: [40,40],
        iconAnchor: [20,20]
      })
    }).addTo(map);
  });
}

window.onload = initMap;
</script>

</body>
</html>
